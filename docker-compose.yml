services:
  uuspace-web:
    build:
      context: .
    container_name: uuspace-web
    restart: unless-stopped
    ports:
      - "8080:8080/tcp"
      - "7101:7101/udp"
      - "7102:7102/udp"
      - "7103:7103/udp"
      - "7104:7104/udp"
      - "7105:7105/udp"
      - "7106:7106/udp"
      - "7107:7107/udp"
      - "7108:7108/udp"
    volumes:
      - "D:/UUSpace1.0.0/SateliteController/Dll/Meter:/meter:ro"
