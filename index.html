<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UUSPACE 卫星地面综测 Mission Workspace</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="mission-bar">
        <div class="brand-block" aria-label="UUSPACE">
          <img class="brand-logo" src="./assets/uuspace.png" alt="" />
          <div>
            <strong>UUSPACE</strong>
            <span>卫星地面综测 Web</span>
          </div>
        </div>
        <nav class="task-nav" aria-label="工作区切换"></nav>
        <div class="satellite-picker" title="卫星类型 / 遥测大表（Meter 目录 xlsx）">
          <label for="satelliteSelect">卫星</label>
          <select id="satelliteSelect" class="satellite-select" aria-busy="true"></select>
        </div>
        <div class="runtime-strip">
          <span id="wsStatusLine"><i class="dot warn"></i><span id="wsStatusText">WS 未连接</span></span>
          <span id="udpPortsLine">UDP <span id="udpPortsText">—</span></span>
          <span><i class="dot pulse"></i>25fps</span>
          <span>Frame:<b id="frameCounter">582912</b></span>
          <span>UTC:<b id="utcClock">08:22:31</b></span>
          <span class="app-version" id="appVersion" title="UUSpace Web 版本">v—</span>
        </div>
      </header>

      <div class="workspace-tabs" role="tablist" aria-label="任务标签"></div>

      <main class="workspace">
        <aside class="dock-left">
          <section class="dock-panel">
            <div class="panel-title">
              <span>遥测摘要</span>
              <button class="icon-button" id="collapseSummary" title="隐藏/展开侧栏">◀</button>
            </div>
            <div class="summary-list" id="summaryList"></div>
          </section>
          <section class="dock-panel alarm-panel">
            <div class="panel-title">
              <span>告警面板</span>
              <button class="icon-button" id="ackAllBtn" title="全部确认">✓</button>
            </div>
            <div class="alarm-list" id="alarmList"></div>
          </section>
        </aside>

        <section class="stage" id="stage"></section>
      </main>

      <button type="button" class="side-rail-handle dock-rail-handle" id="dockExpandHandle" title="展开侧栏" hidden aria-label="展开遥测摘要侧栏">▶</button>

      <footer class="status-flow">
        <div class="status-flow-title">状态流</div>
        <div class="ticker" id="ticker"></div>
      </footer>
    </div>

    <script type="module">
      import { APP_VERSION } from "./modules/core/app-version.js";
      import { formatTelemetryNumber } from "./modules/core/format-telemetry-number.js";
      import { createPersistenceService } from "./modules/core/persistence-service.js";
      import {
        applyWorkspaceSettings,
        loadWorkspaceSettings,
        saveWorkspaceSettings,
        snapshotWorkspaceFromState,
      } from "./modules/core/user-settings.js";
      import {
        TABLE_SEARCH_HISTORY_MAX,
        filterSearchHistory,
        normalizeSearchHistory,
        pushSearchHistory,
      } from "./modules/core/search-history.js";
      import {
        TELEMETRY_COLUMNS,
        TELEMETRY_MIN_COLUMN_WIDTH,
        createDefaultTelemetryColumns,
        mergeTelemetryColumns,
        getVisibleTelemetryColumns,
        isTelemetryColumnVisible,
        resolveTelemetryColumnWidth,
        clampTelemetryColumnWidth,
        getTelemetryColumnMinWidth,
        computeTelemetryColumnAutoWidth,
        TELEMETRY_COLUMN_CELL_PADDING_X,
        TELEMETRY_COLUMN_RESIZE_HANDLE_WIDTH,
      } from "./modules/telemetry/telemetry-columns.js";
      import {
        CURVE_FLUSH_INTERVAL_MS,
        CURVE_MAX_AGE_MS,
        CURVE_MAX_POINTS,
        CURVE_WINDOW_MS,
        CURVE_WINDOW_OPTIONS,
        appendCurveSample,
        appendCurveSampleCoalesced,
        buildCurveOption,
        decimateCurveBuffer,
        formatCurveSeriesLabel,
        normalizeCurveWindowMs,
        registerMissionCurveTheme,
        resolveCurveMaxPoints,
        trimCurveBuffer,
      } from "./modules/curve-chart/curve-chart.js";
      window.formatTelemetryNumber = formatTelemetryNumber;
      window.UUSPACE_PERSIST = createPersistenceService();
      window.UUSPACE_USER_SETTINGS = {
        loadWorkspaceSettings,
        applyWorkspaceSettings,
        snapshotWorkspaceFromState,
        saveWorkspaceSettings,
      };
      window.UUSPACE_APP_VERSION = APP_VERSION;
      const verEl = document.getElementById("appVersion");
      if (verEl) verEl.textContent = `v${APP_VERSION}`;
      window.UUSPACE_SEARCH_HISTORY = {
        TABLE_SEARCH_HISTORY_MAX,
        filterSearchHistory,
        normalizeSearchHistory,
        pushSearchHistory,
      };
      window.UUSPACE_CURVE = {
        CURVE_FLUSH_INTERVAL_MS,
        CURVE_MAX_AGE_MS,
        CURVE_MAX_POINTS,
        CURVE_WINDOW_MS,
        CURVE_WINDOW_OPTIONS,
        appendCurveSample,
        appendCurveSampleCoalesced,
        buildCurveOption,
        decimateCurveBuffer,
        formatCurveSeriesLabel,
        normalizeCurveWindowMs,
        registerMissionCurveTheme,
        resolveCurveMaxPoints,
        trimCurveBuffer,
      };
      window.UUSPACE_TELEMETRY_COLUMNS = {
        TELEMETRY_COLUMNS,
        TELEMETRY_MIN_COLUMN_WIDTH,
        createDefaultTelemetryColumns,
        mergeTelemetryColumns,
        getVisibleTelemetryColumns,
        isTelemetryColumnVisible,
        resolveTelemetryColumnWidth,
        clampTelemetryColumnWidth,
        getTelemetryColumnMinWidth,
        computeTelemetryColumnAutoWidth,
        TELEMETRY_COLUMN_CELL_PADDING_X,
        TELEMETRY_COLUMN_RESIZE_HANDLE_WIDTH,
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js" defer></script>
    <script src="./app.js?v=2.0.6" defer></script>
    <script src="./realtime.js" defer></script>
  </body>
</html>
